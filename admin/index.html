<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TreeHaus — Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c8956c' stroke-width='1.5'%3E%3Cpath d='M12 2L6 10h3l-4 8h14l-4-8h3L12 2z'/%3E%3Crect x='11' y='18' width='2' height='4'/%3E%3C/svg%3E">
</head>
<body>
  <!-- Netlify Identity widget (login UI) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Redirect to login modal if user isn't signed in, then back to admin after login
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
        }
      });
    }
  </script>
</body>
</html>
